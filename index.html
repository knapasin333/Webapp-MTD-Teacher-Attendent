<!DOCTYPE html>
<html lang="th">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เว็บแอป</title>
    <style>
        /* รีเซ็ตขอบหน้าจอเพื่อป้องกัน Scrollbar ซ้อน */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* บังคับไม่ให้หน้าเว็บหลักมี Scrollbar */
        }
        
        /* จัดการสไตล์ของ iframe ผ่าน CSS */
        iframe {
            width: 100%;
            height: 100%;
            border: none; /* ใช้แทน frameborder="0" */
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbzzqE5_Um9QHa16-X1JgwvUqMxWW1SE91lkuU0PiCtWFo-GQAiS-BKn4rNAbvr7s4VV/exec" allowfullscreen></iframe>
</body>
</html>
